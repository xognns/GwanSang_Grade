name: ci

on:
  push:
    branches:
      - main
      - front-end
      - back-end
  pull_request:
    branches:
      - main
      - front-end
      - back-end

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r requirements-dev.txt
      - name: Run backend tests
        run: pytest
      - name: Check docs-contract sync
        run: ../scripts/check_contract_sync.sh
